  <section id="food-forecast">
<h1>Food Forecast<a class="headerlink" href="#food-forecast" title="Link to this heading">¶</a></h1>
<p>User would like to know how much food he or she would need to buy.</p>
<figure class="align-center" id="id1">
<img alt="" src="../../_images/food_forecast_00.png" />
<figcaption>
<p><span class="caption-text">The first step is to select a meal plan and enter the number of days that user will be eating that meal plan. Repeat previous step using a different meal plan if necessary.</span><a class="headerlink" href="#id1" title="Link to this image">¶</a></p>
</figcaption>
</figure>
<hr class="docutils" />
<figure class="align-center" id="id2">
<img alt="" src="../../_images/food_forecast_01.png" />
<figcaption>
<p><span class="caption-text">The last step is to verify the results. The report says that user needs to buy those food quantities to be able to follow those meal plans through the next thirty days.</span><a class="headerlink" href="#id2" title="Link to this image">¶</a></p>
</figcaption>
</figure>
</section>
